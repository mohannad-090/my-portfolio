<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent</title>
<link rel="icon" href="images/email1.png" type="image/x-icon" >
<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        margin:0;
        color:white;
    }
    .container{
        text-align:center;
        background:#0f172a;
        padding:40px;
        border-radius:10px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }
    h1{
        background:linear-gradient(45deg,#2563eb,#38bdf8);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }
    p{
        margin-bottom:25px;
    }
    a{
        display:inline-block;
        margin-top:10px;
        padding:8px 15px;
        border-radius:6px;
        background:linear-gradient(45deg,#2563eb,#38bdf8);
        color:white;
        text-decoration:none;
        transition:0.3s;
    }
    a:hover{
        transform:scale(1.1);
        background:linear-gradient(45deg,#1d4ed8,#60a5fa);
    }
</style>
</head>
<body>
    <div class="container">
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.<br>
    I will get back to you as soon as possible.</p>
    <a href="index.html">Back to Home</a>
    </div>
</body>
</html>
